name: clan-portal

services:
  db:
    container_name: clan-portal-db
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clan_portal}
      POSTGRES_USER: ${POSTGRES_USER:-clan_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clan_portal_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - clan-portal-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    container_name: clan-portal-web
    image: clan-portal:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-clan_portal}:${POSTGRES_PASSWORD:-clan_portal_dev}@db:5432/${POSTGRES_DB:-clan_portal}
    ports:
      - "${CLAN_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  clan-portal-postgres:
